<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SenninProxy - Ultra Browser</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
  <style>
    :root {
      --bg-dark: #0b0e14;
      --panel-dark: #161b22;
      --accent-primary: #58a6ff;
      --text-main: #c9d1d9;
      --tab-inactive: #21262d;
      --border-color: #30363d;
      --toolbar-height: 48px;
      --tab-height: 38px;
    }

    body { 
      margin: 0; 
      background: var(--bg-dark); 
      color: var(--text-main); 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      overflow: hidden; 
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* プログレスバー */
    #sennin-progress {
      position: fixed; top: 0; left: 0; height: 2px; background: var(--accent-primary);
      width: 0%; transition: width 0.3s ease, opacity 0.3s; z-index: 100000; pointer-events: none;
    }

    /* タブバー */
    .tab-bar {
      background: #010409;
      display: flex;
      padding: 8px 8px 0 8px;
      gap: 4px;
      overflow-x: auto;
      align-items: flex-end;
      -webkit-app-region: drag;
    }
    
    .tab {
      background: var(--tab-inactive);
      padding: 0 12px;
      height: var(--tab-height);
      border-radius: 8px 8px 0 0;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 140px;
      max-width: 200px;
      border: 1px solid transparent;
      transition: background 0.2s;
      position: relative;
    }

    .tab.active {
      background: var(--panel-dark);
      border-color: var(--border-color);
      border-bottom: none;
      color: white;
      z-index: 2;
    }

    .tab-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      pointer-events: none;
    }

    .tab-close {
      width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px;
      font-size: 14px;
      opacity: 0.5;
    }
    .tab-close:hover { background: rgba(255,255,255,0.1); opacity: 1; color: #ff7b72; }

    .add-tab-btn {
      padding: 8px 12px;
      cursor: pointer;
      color: var(--text-main);
      font-size: 18px;
      display: flex; align-items: center;
      margin-bottom: 4px;
    }
    .add-tab-btn:hover { color: var(--accent-primary); }

    /* ツールバー（ナビゲーション） */
    .browser-header {
      background: var(--panel-dark);
      height: var(--toolbar-height);
      padding: 0 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border-color);
      z-index: 10;
    }

    .nav-buttons { display: flex; gap: 8px; }
    .nav-btn {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.2s;
      fill: var(--text-main);
    }
    .nav-btn:hover { background: rgba(255,255,255,0.1); }
    
    .omni-box {
      flex: 1;
      max-width: 900px;
      position: relative;
    }
    
    .search-input {
      width: 100%;
      background: #0d1117;
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 6px 16px;
      color: white;
      font-size: 13px;
      outline: none;
      transition: box-shadow 0.2s;
    }
    .search-input:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.2); }

    /* メインエリア */
    .viewport-container {
      flex: 1;
      position: relative;
      background: #000;
    }

    .hero-content {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; background: var(--bg-dark); z-index: 5;
    }

    iframe {
      width: 100%; height: 100%;
      border: none;
      display: none;
      background: white;
    }
    iframe.active { display: block; }

    /* ユーティリティ */
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="sennin-progress"></div>

  <div class="tab-bar" id="tab-bar">
    <div class="add-tab-btn" id="add-tab-btn" title="新しいタブ">+</div>
  </div>

  <header class="browser-header">
    <div class="nav-buttons">
      <div class="nav-btn" id="btn-back" title="戻る">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M11 1L3 8l8 7" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </div>
      <div class="nav-btn" id="btn-forward" title="進む">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M5 1l8 7-8 7" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </div>
      <div class="nav-btn" id="btn-reload" title="再読み込み">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M13.6 3.4A7 7 0 1 0 15 8" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </div>
    </div>

    <div class="omni-box">
      <form id="uv-form">
        <input
          id="uv-address"
          type="search"
          class="search-input"
          placeholder="URLを入力、または検索キーワードを入力..."
          autocomplete="off"
        />
      </form>
    </div>

    <div style="font-size: 11px; opacity: 0.4; min-width: 50px;">Sennin v2</div>
  </header>

  <main class="viewport-container" id="viewport">
    <div class="hero-content" id="hero-ui">
      <h1 style="font-size: 3.5rem; margin: 0; background: linear-gradient(135deg, #58a6ff, #bc8cff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Sennin</h1>
      <p style="opacity: 0.6; font-size: 1.1rem; letter-spacing: 1px;">THE ULTIMATE ANONYMOUS GATEWAY</p>
    </div>
  </main>

  <script src="/uv/uv.bundle.js"></script>
  <script src="/uv/uv.config.js"></script>
  <script src="/assets/js/main.js"></script>
</body>
</html>
